services:
  vapemixer:
    build: /mnt/user/appdata/vapemixer
    image: vapemixer:latest
    container_name: vapemixer
    hostname: vapemixer
    ports:
      - "3333:3333"
    volumes:
      - /mnt/user/appdata/vapemixer/data:/app/data
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TZ=Europe/Prague
    labels:
      - net.unraid.docker.managed=composeman
      - net.unraid.docker.webui=http://[IP]:[PORT:3333]
      - net.unraid.docker.icon=https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/node-js.png
